<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos - Stadion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles.css?v=16">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/Imagenes/logo.png}" alt="Stadion" style="height:52px;">
            Stadion
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/equipos}">Equipos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/jugadores}">Jugadores</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/torneos}">Torneos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/partidos}">Partidos</a></li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/juegos}">Juegos</a></li>
        <li class="nav-item" sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-outline-light btn-sm">👤</a>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">🔒</button>
            </form>
        </li>
    </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="page-header d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <h1>Equipos</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/equipos/nuevo}" class="btn btn-primary">+ Nuevo Equipo</a>
    </div>

    <div class="grid-cards" th:if="${not #lists.isEmpty(equipos)}">
        <div th:each="equipo : ${equipos}"
             class="card card-link card--poster-equipo"
             style="position:relative"
             th:attr="data-href=@{/equipos/{id}(id=${equipo.id})}">

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/equipos/eliminar/{id}(id=${equipo.id})}"
               class="btn btn-danger card-delete-btn stop-propagate"
               data-confirm="¿Eliminar este equipo?">✕</a>

            <div class="card-poster-title" th:text="${equipo.nombre}">Nombre equipo</div>

            <img th:if="${equipo.foto != null and equipo.foto != ''}"
                 th:src="@{/Imagenes/{img}(img=${equipo.foto})}"
                 class="card-img" alt="Logo equipo">
            <div th:unless="${equipo.foto != null and equipo.foto != ''}"
                 class="card-img-placeholder">🛡️</div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(equipos)}">
        <p>No hay equipos registrados aún.</p>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/equipos/nuevo}" class="btn btn-primary">Registrar primer equipo</a>
    </div>
</div>

</body>
<script th:src="@{/app.js?v=7}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
