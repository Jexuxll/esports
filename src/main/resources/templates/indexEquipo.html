<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos - Stadion</title>
    <link rel="stylesheet" href="/styles.css?v=12">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">
        <img class="nav-logo" th:src="@{/Imagenes/logo.png}" alt="Stadion">
        Stadion
    </a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/equipos}" class="active">Equipos</a></li>
        <li><a th:href="@{/jugadores}">Jugadores</a></li>
        <li><a th:href="@{/torneos}">Torneos</a></li>
        <li><a th:href="@{/partidos}">Partidos</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/juegos}">Juegos</a></li>
        <li sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-secondary" style="padding:0.45rem 0.45rem;">👤</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post" style="display:contents;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary">🔒</button>
            </form>
        </li>
    </ul>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Equipos</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/equipos/nuevo}" class="btn btn-primary">+ Nuevo Equipo</a>
    </div>

    <div class="grid-cards" th:if="${not #lists.isEmpty(equipos)}">
        <div th:each="equipo : ${equipos}"
             class="card card-link card--poster-equipo"
             style="position:relative"
             th:attr="data-href=@{/equipos/{id}(id=${equipo.id})}">

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/equipos/eliminar/{id}(id=${equipo.id})}"
               class="btn btn-danger card-delete-btn stop-propagate"
               data-confirm="¿Eliminar este equipo?">✕</a>

            <div class="card-poster-title" th:text="${equipo.nombre}">Nombre equipo</div>

            <img th:if="${equipo.foto != null and equipo.foto != ''}"
                 th:src="@{/Imagenes/{img}(img=${equipo.foto})}"
                 class="card-img" alt="Logo equipo">
            <div th:unless="${equipo.foto != null and equipo.foto != ''}"
                 class="card-img-placeholder">🛡️</div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(equipos)}">
        <p>No hay equipos registrados aún.</p>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/equipos/nuevo}" class="btn btn-primary">Registrar primer equipo</a>
    </div>
</div>

</body>
<script th:src="@{/app.js?v=4}"></script>
</html>
