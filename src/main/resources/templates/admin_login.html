<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - ESports Manager</title>
    <link rel="stylesheet" href="/styles.css?v=12">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">
        <img class="nav-logo" th:src="@{/Imagenes/logo.png}" alt="ESports">
        E<span>Sports</span>
    </a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <li><a th:href="@{/torneos}">Torneos</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/partidos}">Partidos</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/juegos}">Juegos</a></li>
    </ul>
</nav>

<div class="container">
    <div class="form-card" style="max-width:460px; margin:2rem auto;">
        <h2>Acceso Admin</h2>
        <p style="color:var(--text-secondary); margin-top:0.25rem;">
            Solo el administrador puede crear, editar o eliminar contenido.
        </p>

        <form th:action="@{/admin/login}" method="post">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input id="username" name="username" type="text" class="form-control" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" class="form-control" required autocomplete="current-password">
            </div>

            <div th:if="${param.error}" class="form-group" style="color:#ff8a8a; font-size:0.95rem;">
                Usuario o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="form-group" style="color:#7dd3fc; font-size:0.95rem;">
                Sesión cerrada correctamente.
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Iniciar sesión</button>
                <a th:href="@{/}" class="btn btn-secondary btn-back">Volver</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
