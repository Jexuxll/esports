<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Stadion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles.css?v=16">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/Imagenes/logo.png}" alt="Stadion" style="height:52px;">
            Stadion
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/equipos}">Equipos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/torneos}">Torneos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/partidos}">Partidos</a></li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/juegos}">Juegos</a></li>
    </ul>
        </div>
    </div>
</nav>

<div class="container-fluid py-3">
    <div class="form-card" style="max-width:460px; margin:2rem auto;">
        <h2>Acceso Admin</h2>

        <form th:action="@{/admin/login}" method="post">
            <div class="mb-3">
                <label for="username">Usuario</label>
                <input id="username" name="username" type="text" class="form-control" required autocomplete="username">
            </div>

            <div class="mb-3">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" class="form-control" required autocomplete="current-password">
            </div>

            <div th:if="${param.error}" class="mb-2" style="color:#ff8a8a; font-size:0.95rem;">
                Usuario o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="mb-2" style="color:#7dd3fc; font-size:0.95rem;">
                Sesión cerrada correctamente.
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Acceder</button>
                <a th:href="@{/}" class="btn btn-secondary btn-back">Volver</a>
            </div>
        </form>
    </div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
