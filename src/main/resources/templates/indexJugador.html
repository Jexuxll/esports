<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugadores - Stadion</title>
    <link rel="stylesheet" href="/styles.css?v=12">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">
        <img class="nav-logo" th:src="@{/Imagenes/logo.png}" alt="Stadion">
        Stadion
    </a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <li><a th:href="@{/jugadores}" class="active">Jugadores</a></li>
        <li><a th:href="@{/torneos}">Torneos</a></li>
        <li><a th:href="@{/partidos}">Partidos</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/juegos}">Juegos</a></li>
        <li sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-secondary" style="padding:0.45rem 0.45rem;">👤</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post" style="display:contents;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary">🔒</button>
            </form>
        </li>
    </ul>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Jugadores</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/jugadores/nuevo}" class="btn btn-primary">+ Nuevo Jugador</a>
    </div>

    <div class="filter-bar" th:if="${not #lists.isEmpty(jugadores)}">
        <input type="text" id="filterSearch" class="filter-input" placeholder="Buscar por nick, nombre, equipo…">
        <select id="filterRol" class="filter-select">
            <option value="">Todos los roles</option>
        </select>
        <select id="filterJuego" class="filter-select">
            <option value="">Todos los juegos</option>
        </select>
        <select id="filterEquipo" class="filter-select">
            <option value="">Todos los equipos</option>
        </select>
        <select id="filterPerPage" class="filter-select">
            <option value="10">10 por página</option>
            <option value="24" selected>24 por página</option>
            <option value="50">50 por página</option>
            <option value="100">100 por página</option>
        </select>
    </div>

    <div class="idcard-grid" th:if="${not #lists.isEmpty(jugadores)}">
        <div th:each="jugador : ${jugadores}"
             class="idcard filter-item"
                             th:style="|--player-hue:${(jugador.id * 53) % 360};|"
            th:attr="data-href=@{/jugadores/{id}(id=${jugador.id})},data-search=${#strings.toLowerCase(jugador.nickname + ' ' + jugador.nombre + ' ' + jugador.apellido + ' ' + (jugador.equipo != null ? jugador.equipo.tag : '') + ' ' + (jugador.equipo != null ? jugador.equipo.nombre : '') + ' ' + (jugador.rol != null ? jugador.rol : '') + ' ' + (jugador.juego != null ? jugador.juego : ''))},data-rol=${jugador.rol != null ? jugador.rol : ''},data-juego=${jugador.juego != null ? jugador.juego : ''},data-equipo=${jugador.equipo != null ? jugador.equipo.tag : ''}">

            <!-- Foto -->
            <img th:if="${jugador.foto != null and jugador.foto != ''}"
                 th:src="@{/Imagenes/{f}(f=${jugador.foto})}"
                 class="idcard-photo" alt="Foto jugador">
              <img th:unless="${jugador.foto != null and jugador.foto != ''}"
                  th:src="@{/Imagenes/{f}(f=${(jugador.id % 2 == 0 ? 'ja' : 'jr') + ((jugador.id % 4) + 1) + '.png'})}"
                  class="idcard-photo" alt="Foto jugador">

            <!-- Overlay gradiente -->
            <div class="idcard-overlay"></div>

            <!-- Info inferior -->
            <div class="idcard-body">
                <div class="idcard-nick"     th:text="${jugador.nickname}">NICKNAME</div>
                <div class="idcard-fullname" th:text="${jugador.nombre + ' ' + jugador.apellido}">Nombre Apellido</div>
                <div class="idcard-equipo" th:if="${jugador.equipo != null}" th:text="${jugador.equipo.tag}">TAG</div>
            </div>

            <!-- Acciones admin (visibles solo al hover) -->
            <div class="idcard-actions" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/jugadores/editar/{id}(id=${jugador.id})}"
                   class="btn btn-secondary btn-sm stop-propagate">✏️</a>
                <a th:href="@{/jugadores/eliminar/{id}(id=${jugador.id})}"
                   class="btn btn-danger btn-sm stop-propagate"
                   data-confirm="¿Eliminar este jugador?">🗑️</a>
            </div>
        </div>
    </div>
    <div id="idcard-pager" class="idcard-pager"></div>

    <div class="empty-state" th:if="${#lists.isEmpty(jugadores)}">
        <p>No hay jugadores registrados aún.</p>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/jugadores/nuevo}" class="btn btn-primary">Registrar primer jugador</a>
    </div>
</div>

</body>
<script th:src="@{/app.js?v=4}"></script>
</html>
