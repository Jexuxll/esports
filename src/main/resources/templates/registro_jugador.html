<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${jugador.id != 0} ? 'Editar Jugador' : 'Nuevo Jugador'">Jugador - ESports Manager</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">E<span>Sports</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <!-- <li><a th:href="@{/jugadores}" class="active">Jugadores</a></li> -->
        <li><a th:href="@{/torneos}">Torneos</a></li>
        <li><a th:href="@{/partidos}">Partidos</a></li>
        <!-- <li><a th:href="@{/juegos}">Juegos</a></li> -->
    </ul>
</nav>

<div class="container">
    <div class="form-card">
        <h2 th:text="${jugador.id != 0} ? 'Editar Jugador' : 'Nuevo Jugador'">Jugador</h2>

        <form th:action="${jugador.id != 0} ? @{/jugadores/actualizar} : @{/jugadores/guardar}"
              th:object="${jugador}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="nickname">Nickname</label>
                <input type="text" id="nickname" th:field="*{nickname}" class="form-control"
                       placeholder="Ej: s1mple" required>
            </div>

            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}" class="form-control"
                       placeholder="Nombre real" required>
            </div>

            <div class="form-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" th:field="*{apellido}" class="form-control"
                       placeholder="Apellido" required>
            </div>

            <div class="form-group">
                <label for="edad">Edad</label>
                <input type="number" id="edad" th:field="*{edad}" class="form-control"
                       placeholder="Edad del jugador" min="1" max="100" required>
            </div>

            <div class="form-group">
                <label for="nacionalidad">Nacionalidad</label>
                <select id="nacionalidad" th:field="*{nacionalidad}" class="form-control" required>
                    <option value="">-- Selecciona una nacionalidad --</option>
                    <option th:each="n : ${nacionalidades}" th:value="${n}" th:text="${n}"
                            th:selected="${jugador.nacionalidad == n}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="juego">Juego</label>
                <select id="juego" th:field="*{juego}" class="form-control" required>
                    <option value="">-- Selecciona un juego --</option>
                    <option th:each="j : ${juegos}"
                            th:value="${j.nombre}"
                            th:text="${j.nombre}"
                            th:selected="${jugador.juego == j.nombre}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="rol">Rol</label>
                <select id="rol" th:field="*{rol}" class="form-control"
                        th:attr="data-valor-actual=${jugador.rol}" required>
                    <option value="">-- Selecciona un rol --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="equipoId">Equipo</label>
                <select id="equipoId" name="equipo.id" class="form-control" required>
                    <option value="">-- Selecciona un equipo --</option>
                    <option th:each="e : ${equipos}"
                            th:value="${e.id}"
                            th:text="${e.nombre + ' [' + e.tag + ']'}"
                            th:selected="${jugador.equipo != null and jugador.equipo.id == e.id}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="fotoFile">Foto del jugador</label>
                <input type="file" id="fotoFile" name="fotoFile" class="form-control"
                       accept="image/*">
                <div th:if="${jugador.foto != null and jugador.foto != ''}" style="margin-top: 0.5rem;">
                    <small style="color: var(--text-muted);">Foto actual:</small><br>
                    <img th:src="@{/Imagenes/{f}(f=${jugador.foto})}" class="img-thumb-lg" alt="Foto actual"
                         style="margin-top:0.3rem;">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${jugador.id != 0} ? 'Guardar cambios' : 'Crear jugador'">Guardar</span>
                </button>
                <a th:href="@{/jugadores}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
<script th:src="@{/app.js}"></script>
<script th:src="@{/roles-por-juego.js}"></script>
</html>
