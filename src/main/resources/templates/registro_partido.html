<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Partido - ESports Manager</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">E<span>Sports</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <!-- <li><a th:href="@{/jugadores}">Jugadores</a></li> -->
        <li><a th:href="@{/torneos}">Torneos</a></li>
        <li><a th:href="@{/partidos}" class="active">Partidos</a></li>
        <!-- <li><a th:href="@{/juegos}">Juegos</a></li> -->
    </ul>
</nav>

<div class="container">
    <div class="form-card">
        <h2>Nuevo Partido</h2>

        <form th:action="${torneo != null} ? @{/torneos/{idTorneo}/partidos/guardar(idTorneo=${torneo.id})} : @{/partidos/guardar}" th:object="${partido}" method="post">

            <div class="form-group" th:if="${torneo == null}">
                <label for="torneoId">Torneo</label>
                <select id="torneoId" name="torneo.id" class="form-control" required>
                    <option value="">-- Selecciona torneo --</option>
                    <option th:each="t : ${torneos}" th:value="${t.id}" th:text="${t.nombre}"></option>
                </select>
            </div>

            <div class="form-group" th:if="${torneo != null}">
                <label>Torneo</label>
                <input type="text" class="form-control" th:value="${torneo.nombre}" readonly>
            </div>

            <div class="form-group" th:if="${torneo == null}">
                <label for="equipoLocalId">Equipo Local</label>
                <select id="equipoLocalId" name="equipoLocal.id" class="form-control" required>
                    <option value="">-- Selecciona equipo local --</option>
                    <option th:each="e : ${equipos}" th:value="${e.id}" th:text="${e.nombre}"></option>
                </select>
            </div>

            <div class="form-group" th:if="${torneo != null}">
                <label for="equipoLocalIdTorneo">Equipo Local</label>
                <select id="equipoLocalIdTorneo" name="equipoLocalId" class="form-control" required>
                    <option value="">-- Selecciona equipo local --</option>
                    <option th:each="et : ${equiposInscritos}" th:value="${et.equipo.id}" th:text="${et.equipo.nombre}"></option>
                </select>
            </div>

            <div class="form-group" th:if="${torneo == null}">
                <label for="equipoVisitanteId">Equipo Visitante</label>
                <select id="equipoVisitanteId" name="equipoVisitante.id" class="form-control" required>
                    <option value="">-- Selecciona equipo visitante --</option>
                    <option th:each="e : ${equipos}" th:value="${e.id}" th:text="${e.nombre}"></option>
                </select>
            </div>

            <div class="form-group" th:if="${torneo != null}">
                <label for="equipoVisitanteIdTorneo">Equipo Visitante</label>
                <select id="equipoVisitanteIdTorneo" name="equipoVisitanteId" class="form-control" required>
                    <option value="">-- Selecciona equipo visitante --</option>
                    <option th:each="et : ${equiposInscritos}" th:value="${et.equipo.id}" th:text="${et.equipo.nombre}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="ronda">Ronda</label>
                <select id="ronda" th:field="*{ronda}" class="form-control">
                    <option value="">-- Selecciona ronda --</option>
                    <option value="Grupos">Grupos</option>
                    <option value="Octavos">Octavos de final</option>
                    <option value="Cuartos">Cuartos de final</option>
                    <option value="Semifinal">Semifinal</option>
                    <option value="Final">Final</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fechaPartido">Fecha y hora del partido</label>
                <input type="datetime-local" id="fechaPartido" th:field="*{fechaPartido}"
                       class="form-control" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Crear partido</button>
                <a th:if="${torneo == null}" th:href="@{/partidos}" class="btn btn-secondary">Cancelar</a>
                <a th:if="${torneo != null}" th:href="@{/torneos/{id}(id=${torneo.id})}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
<script th:src="@{/app.js}"></script>
</html>
