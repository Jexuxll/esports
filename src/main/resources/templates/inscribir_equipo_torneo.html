<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="Stadion">
    <meta name="theme-color" content="#0f1520">
    <title>Inscribir Equipo - Stadion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles.css?v=16">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/Imagenes/logo.png}" alt="Stadion" style="height:52px;">
            Stadion
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/equipos}">Equipos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/jugadores}">Jugadores</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/torneos}">Torneos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/partidos}">Partidos</a></li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/juegos}">Juegos</a></li>
    </ul>
        </div>
    </div>
</nav>

<div class="container-fluid py-3">
    <div class="page-header page-header--stack">
        <div>
            <div class="page-kicker">Roster injection</div>
            <h1>Inscribir Equipo</h1>
            <p class="page-lead">Añade un roster al cuadro competitivo del torneo desde una interfaz más consistente con el resto del sistema.</p>
        </div>
    </div>

    <div class="form-card">
        <h2>Inscribir Equipo</h2>

        <p class="form-note">
            Torneo: <strong th:text="${torneo.nombre}">Nombre torneo</strong>
        </p>

        <form th:action="@{/torneos/{id}/inscribir(id=${torneo.id})}" method="post">
            <div class="mb-3">
                <label for="equipoId">Equipo</label>
                <select id="equipoId" name="equipoId" class="form-control" required>
                    <option value="">-- Selecciona un equipo --</option>
                    <option th:each="e : ${equipos}" th:value="${e.id}" th:text="${e.nombre + ' (' + e.tag + ')'}"></option>
                </select>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Inscribir</button>
                <a th:href="@{/torneos/{id}(id=${torneo.id})}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
<script th:src="@{/app.js?v=7}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
