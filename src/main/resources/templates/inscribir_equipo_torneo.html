<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscribir Equipo - ESports Manager</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">E<span>Sports</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <!-- <li><a th:href="@{/jugadores}">Jugadores</a></li> -->
        <li><a th:href="@{/torneos}" class="active">Torneos</a></li>
        <li><a th:href="@{/partidos}">Partidos</a></li>
        <!-- <li><a th:href="@{/juegos}">Juegos</a></li> -->
    </ul>
</nav>

<div class="container">
    <div class="page-header page-header--stack">
        <div>
            <div class="page-kicker">Roster injection</div>
            <h1>Inscribir Equipo</h1>
            <p class="page-lead">Añade un roster al cuadro competitivo del torneo desde una interfaz más consistente con el resto del sistema.</p>
        </div>
    </div>

    <div class="form-card">
        <h2>Inscribir Equipo</h2>

        <p class="form-note">
            Torneo: <strong th:text="${torneo.nombre}">Nombre torneo</strong>
        </p>

        <form th:action="@{/torneos/{id}/inscribir(id=${torneo.id})}" method="post">
            <div class="form-group">
                <label for="equipoId">Equipo</label>
                <select id="equipoId" name="equipoId" class="form-control" required>
                    <option value="">-- Selecciona un equipo --</option>
                    <option th:each="e : ${equipos}" th:value="${e.id}" th:text="${e.nombre + ' (' + e.tag + ')'}"></option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Inscribir</button>
                <a th:href="@{/torneos/{id}(id=${torneo.id})}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
<script th:src="@{/app.js}"></script>
</html>
