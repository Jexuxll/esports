<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partidos - ESports Manager</title>
    <link rel="stylesheet" href="/styles.css?v=4">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">E<span>Sports</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <!-- <li><a th:href="@{/jugadores}">Jugadores</a></li> -->
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/jugadores}">Jugadores</a></li>
        <li><a th:href="@{/torneos}">Torneos</a></li>
        <li><a th:href="@{/partidos}" class="active">Partidos</a></li>
        <!-- <li><a th:href="@{/juegos}">Juegos</a></li> -->
        <li sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-secondary" style="padding:0.45rem 0.8rem;">🔐 Iniciar sesión</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post" style="display:contents;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary">Salir Admin</button>
            </form>
        </li>
    </ul>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Partidos <span>Registrados</span></h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/partidos/nuevo}" class="btn btn-primary">+ Nuevo Partido</a>
    </div>

    <!-- Pestañas por torneo -->
    <div th:if="${not #lists.isEmpty(partidos)}" class="tabs-wrapper">

        <div class="tabs-nav" id="tabsNavPartidos">
            <button th:each="entry, iterStat : ${partidosPorTorneo}"
                    th:text="${entry.key}"
                    th:attr="data-tab=${iterStat.index}"
                    th:classappend="${iterStat.first} ? 'active' : ''"
                    class="tab-btn"
                    type="button">Torneo</button>
        </div>

        <div th:each="entry, iterStat : ${partidosPorTorneo}"
             th:attr="data-panel=${iterStat.index}"
             th:classappend="${iterStat.first} ? 'tab-panel active' : 'tab-panel'"
             class="tab-panel">

            <div class="match-list">
                <div th:each="partido : ${entry.value}"
                     class="match-item match-item--stacked card-link"
                     th:attr="data-href=@{/partidos/{id}(id=${partido.id})}">

                    <!-- Arriba: ronda encima de fecha, centrado -->
                    <div class="match-item-header">
                        <div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;">
                            <span class="match-item-ronda" th:text="${partido.ronda != null ? partido.ronda : '—'}">Ronda</span>
                            <span class="match-item-date" th:text="${partido.fechaPartido != null ? #temporals.format(partido.fechaPartido, 'dd/MM/yyyy · HH:mm') : '—'}">Fecha</span>
                        </div>
                    </div>

                    <!-- Centro: logo local + enfrentamiento + logo visitante -->
                    <div class="match-item-matchup">
                        <!-- Logo equipo local -->
                        <div class="match-item-logo">
                            <img th:if="${partido.equipoLocal != null and partido.equipoLocal.foto != null and partido.equipoLocal.foto != ''}"
                                 th:src="@{/Imagenes/{f}(f=${partido.equipoLocal.foto})}"
                                 class="match-item-logo__img" alt="">
                            <div th:unless="${partido.equipoLocal != null and partido.equipoLocal.foto != null and partido.equipoLocal.foto != ''}"
                                 class="match-item-logo__placeholder">🛡️</div>
                        </div>

                        <span class="match-item-team"
                              th:classappend="${partido.ganador != null and partido.equipoLocal != null and partido.ganador.id == partido.equipoLocal.id} ? ' match-item-team--winner'"
                              th:text="${partido.equipoLocal != null ? partido.equipoLocal.nombre : 'TBD'}">Local</span>

                        <div class="match-item-score"
                             th:if="${partido.marcadorLocal != null and partido.marcadorVisitante != null}">
                            <span th:text="${partido.marcadorLocal}">0</span>
                            <span class="match-item-dash">–</span>
                            <span th:text="${partido.marcadorVisitante}">0</span>
                        </div>
                        <div class="match-item-score match-item-score--pending"
                             th:unless="${partido.marcadorLocal != null and partido.marcadorVisitante != null}">VS</div>

                        <span class="match-item-team match-item-team--rival"
                              th:classappend="${partido.ganador != null and partido.equipoVisitante != null and partido.ganador.id == partido.equipoVisitante.id} ? ' match-item-team--winner'"
                              th:text="${partido.equipoVisitante != null ? partido.equipoVisitante.nombre : 'TBD'}">Visitante</span>

                        <!-- Logo equipo visitante -->
                        <div class="match-item-logo">
                            <img th:if="${partido.equipoVisitante != null and partido.equipoVisitante.foto != null and partido.equipoVisitante.foto != ''}"
                                 th:src="@{/Imagenes/{f}(f=${partido.equipoVisitante.foto})}"
                                 class="match-item-logo__img" alt="">
                            <div th:unless="${partido.equipoVisitante != null and partido.equipoVisitante.foto != null and partido.equipoVisitante.foto != ''}"
                                 class="match-item-logo__placeholder">🛡️</div>
                        </div>
                    </div>

                    <!-- Abajo: ganador/pendiente centrado + botones admin -->
                    <div class="match-item-footer">
                        <span th:if="${partido.ganador != null}" class="badge badge-success" th:text="${partido.ganador.nombre}">Ganador</span>
                        <span th:if="${partido.ganador == null}" class="badge badge-warning">Pendiente</span>
                        <span sec:authorize="hasRole('ADMIN')" class="stop-propagate" style="display:flex;gap:0.4rem;">
                            <a th:href="@{/partidos/editar/{id}(id=${partido.id})}" class="btn btn-secondary btn-sm stop-propagate">Editar</a>
                            <a th:href="@{/partidos/eliminar/{id}(id=${partido.id})}" class="btn btn-danger btn-sm stop-propagate"
                               data-confirm="¿Eliminar este partido?">Eliminar</a>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(partidos)}">
        <p>No hay partidos registrados aún.</p>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/partidos/nuevo}" class="btn btn-primary">Registrar primer partido</a>
    </div>
</div>

</body>
<script th:src="@{/app.js}"></script>
</html>
