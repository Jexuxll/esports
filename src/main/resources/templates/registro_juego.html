<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${juego.id != 0} ? 'Editar Juego' : 'Nuevo Juego'">Juego - Stadion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles.css?v=16">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/Imagenes/logo.png}" alt="Stadion" style="height:52px;">
            Stadion
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/equipos}">Equipos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/jugadores}">Jugadores</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/torneos}">Torneos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/partidos}">Partidos</a></li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link active" th:href="@{/juegos}">Juegos</a></li>
    </ul>
        </div>
    </div>
</nav>

<div class="container-fluid py-3">
    <div class="page-header page-header--stack">
        <div>
            <div class="page-kicker">Game editor</div>
            <h1 th:text="${juego.id != 0} ? 'Editar Juego' : 'Nuevo Juego'">Juego</h1>
            <p class="page-lead">Registra el título que servirá de base para torneos, jugadores y roles dentro del ecosistema.</p>
        </div>
    </div>

    <div class="form-card">
        <h2 th:text="${juego.id != 0} ? 'Editar Juego' : 'Nuevo Juego'">Juego</h2>
        <p class="form-intro">Mantén un catálogo limpio y reconocible con nombre y branding del juego.</p>

        <form th:action="${juego.id != 0} ? @{/juegos/actualizar} : @{/juegos/guardar}"
              th:object="${juego}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label for="nombre">Nombre del juego</label>
                <input type="text" id="nombre" th:field="*{nombre}" class="form-control"
                       placeholder="Ej: League of Legends" required>
            </div>

            <div class="mb-3">
                <label for="fotoFile">Logo del juego</label>
                <input type="file" id="fotoFile" name="fotoFile" class="form-control"
                       accept="image/*">
                <div th:if="${juego.foto != null and juego.foto != ''}" class="current-preview">
                    <small>Logo actual</small><br>
                    <img th:src="@{/Imagenes/{f}(f=${juego.foto})}" class="img-thumb-lg" alt="Logo actual"
                         style="margin-top:0.3rem;">
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${juego.id != 0} ? 'Guardar cambios' : 'Crear juego'">Guardar</span>
                </button>
                <a th:href="@{/juegos}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
<script th:src="@{/app.js?v=7}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
