<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="Stadion">
    <meta name="theme-color" content="#0f1520">
    <title>Juegos - Stadion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles.css?v=16">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/Imagenes/logo.png}" alt="Stadion" style="height:52px;">
            Stadion
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/equipos}">Equipos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/jugadores}">Jugadores</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/torneos}">Torneos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/partidos}">Partidos</a></li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link active" th:href="@{/juegos}">Juegos</a></li>
        <li class="nav-item" sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-outline-light btn-sm">👤</a>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">🔒</button>
            </form>
        </li>
    </ul>
        </div>
    </div>
</nav>

<div class="container-fluid py-3">
    <div class="page-header">
        <div>
            <h1>Juegos</h1>
            <p class="page-subtitle" th:if="${not #lists.isEmpty(juegos)}"
               th:text="${#lists.size(juegos)} + ' título' + (${#lists.size(juegos)} != 1 ? 's' : '') + ' registrado' + (${#lists.size(juegos)} != 1 ? 's' : '')">0 títulos registrados</p>
        </div>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/juegos/nuevo}" class="btn btn-primary">+</a>
    </div>

    <div class="filter-bar" th:if="${not #lists.isEmpty(juegos)}">
        <input type="text" id="filterSearch" class="filter-input" placeholder="Buscar juego…">
    </div>

    <div class="match-list" th:if="${not #lists.isEmpty(juegos)}">
        <div th:each="juego : ${juegos}"
             class="match-item juego-list-item filter-item"
             th:attr="data-search=${#strings.toLowerCase(juego.nombre)}">
            <span class="juego-list-item__name" th:text="${juego.nombre}">Juego</span>
            <div class="juego-list-item__actions stop-propagate" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/juegos/editar/{id}(id=${juego.id})}" class="btn btn-secondary btn-sm stop-propagate">✏️</a>
                <a th:href="@{/juegos/eliminar/{id}(id=${juego.id})}" class="btn btn-danger btn-sm stop-propagate"
                   data-confirm="¿Eliminar este juego? Se perderá la referencia en torneos y jugadores.">🗑️</a>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(juegos)}">
        <p>No hay juegos registrados aún.</p>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/juegos/nuevo}" class="btn btn-primary">Registrar primer juego</a>
    </div>
</div>

</body>
<script th:src="@{/app.js?v=7}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
