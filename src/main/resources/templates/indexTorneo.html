<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneos - ESports Manager</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">E<span>Sports</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <!-- <li><a th:href="@{/jugadores}">Jugadores</a></li> -->
        <li><a th:href="@{/torneos}" class="active">Torneos</a></li>
        <li><a th:href="@{/partidos}">Partidos</a></li>
        <!-- <li><a th:href="@{/juegos}">Juegos</a></li> -->
        <li sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-secondary" style="padding:0.45rem 0.8rem;">🔐 Iniciar sesión</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post" style="display:contents;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary">Salir Admin</button>
            </form>
        </li>
    </ul>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Torneos <span>Registrados</span></h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/torneos/nuevo}" class="btn btn-primary">+ Nuevo Torneo</a>
    </div>

    <div class="grid-cards" th:if="${not #lists.isEmpty(torneos)}">
        <div class="card card-link" th:each="torneo : ${torneos}"
             th:attr="data-href=@{/torneos/{id}(id=${torneo.id})}">
            <img th:if="${torneo.foto != null and torneo.foto != ''}"
                 th:src="@{/Imagenes/{f}(f=${torneo.foto})}"
                 class="card-img" alt="Foto torneo">
            <div th:unless="${torneo.foto != null and torneo.foto != ''}" class="card-img-placeholder">🏆</div>

            <div class="card-body">
                <div class="card-title" th:text="${torneo.nombre}">Nombre torneo</div>
                <div class="card-subtitle" th:text="${torneo.juego}">Juego</div>

                <div style="display:flex; flex-direction:column; gap:0.3rem; font-size:0.85rem; color:var(--text-secondary);">
                    <span>
                        📅 <span th:text="${torneo.fechaInicio}">Inicio</span>
                        → <span th:text="${torneo.fechaFin}">Fin</span>
                    </span>
                    <span>
                        <span th:switch="${torneo.estado}">
                            <span th:case="'Activo'" class="badge badge-success">Activo</span>
                            <span th:case="'Pendiente'" class="badge badge-warning">Pendiente</span>
                            <span th:case="'Finalizado'" class="badge badge-default">Finalizado</span>
                            <span th:case="*" class="badge badge-info" th:text="${torneo.estado}">Estado</span>
                        </span>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(torneos)}">
        <p>No hay torneos registrados aún.</p>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/torneos/nuevo}" class="btn btn-primary">Crear primer torneo</a>
    </div>
</div>

</body>
<script th:src="@{/app.js}"></script>
</html>
