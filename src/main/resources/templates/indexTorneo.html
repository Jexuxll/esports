<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneos - ESports Manager</title>
    <link rel="stylesheet" href="/styles.css?v=12">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">
        <img class="nav-logo" th:src="@{/Imagenes/logo.png}" alt="ESports">
        E<span>Sports</span>
    </a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/jugadores}">Jugadores</a></li>
        <li><a th:href="@{/torneos}" class="active">Torneos</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/partidos}">Partidos</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/juegos}">Juegos</a></li>
        <li sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-secondary" style="padding:0.45rem 0.8rem;">🔐 Iniciar sesión</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post" style="display:contents;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary">Salir Admin</button>
            </form>
        </li>
    </ul>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Torneos</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/torneos/nuevo}" class="btn btn-primary">+ Nuevo Torneo</a>
    </div>

    <div class="filter-bar" th:if="${not #lists.isEmpty(torneos)}">
        <input type="text" id="filterSearch" class="filter-input" placeholder="Buscar torneo, juego…">
        <select id="filterEstado" class="filter-select">
            <option value="">Todos los estados</option>
            <option value="ACTIVO">Activo</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="FINALIZADO">Finalizado</option>
        </select>
        <select id="filterJuego" class="filter-select">
            <option value="">Todos los juegos</option>
        </select>
    </div>

    <div class="torneo-banner-list" th:if="${not #lists.isEmpty(torneos)}">
        <div class="torneo-mini-banner card-link filter-item" th:each="torneo : ${torneos}"
             style="position:relative"
             th:attr="data-href=@{/torneos/{id}(id=${torneo.id})},data-search=${#strings.toLowerCase(torneo.nombre + ' ' + (torneo.juego != null ? torneo.juego : ''))},data-estado=${torneo.estado != null ? torneo.estado : ''},data-juego=${torneo.juego != null ? torneo.juego : ''}">

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/torneos/eliminar/{id}(id=${torneo.id})}"
               class="btn btn-danger card-delete-btn stop-propagate"
               data-confirm="¿Eliminar este torneo?">✕</a>
            <div class="torneo-mini-banner__media">
                <img th:if="${torneo.foto != null and torneo.foto != ''}"
                     th:src="@{/Imagenes/{f}(f=${torneo.foto})}"
                     alt="Logo torneo"
                     class="torneo-mini-banner__cover">
                <div th:unless="${torneo.foto != null and torneo.foto != ''}"
                     class="torneo-mini-banner__cover torneo-mini-banner__cover-placeholder">🏆</div>
            </div>

            <div class="torneo-mini-banner__content">
                <div class="torneo-mini-banner__top">
                    <div class="torneo-mini-banner__estado">
                        <div class="torneo-mini-banner__label">Estado</div>
                        <span th:switch="${torneo.estado}">
                            <span th:case="'ACTIVO'" class="badge badge-success">Activo</span>
                            <span th:case="'PENDIENTE'" class="badge badge-warning">Pendiente</span>
                            <span th:case="'FINALIZADO'" class="badge badge-finished">Finalizado</span>
                            <span th:case="*" class="badge badge-info" th:text="${torneo.estado}">Estado</span>
                        </span>
                    </div>

                    <h2 class="torneo-mini-banner__title" th:text="${torneo.nombre}">Nombre torneo</h2>
                </div>

                <div class="torneo-mini-banner__bottom">
                    <div>
                        <div class="torneo-mini-banner__label">Juego</div>
                        <div class="torneo-mini-banner__value" th:text="${torneo.juego}">Juego</div>
                    </div>
                    <div>
                        <div class="torneo-mini-banner__label">Fechas</div>
                        <div class="torneo-mini-banner__value torneo-mini-banner__date-range">
                            <span th:text="${torneo.fechaInicio}">Inicio</span>
                            <span>→</span>
                            <span th:text="${torneo.fechaFin}">Fin</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(torneos)}">
        <p>No hay torneos registrados aún.</p>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/torneos/nuevo}" class="btn btn-primary">Crear primer torneo</a>
    </div>
</div>

</body>
<script th:src="@{/app.js?v=4}"></script>
</html>
