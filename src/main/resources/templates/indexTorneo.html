<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Todos los torneos de Stadion: fases activas, clasificaciones e inscripciones abiertas.">
    <meta name="author" content="Stadion">
    <meta name="theme-color" content="#0f1520">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Stadion">
    <meta property="og:title" content="Torneos - Stadion">
    <meta property="og:description" content="Todos los torneos de Stadion: fases activas, clasificaciones e inscripciones abiertas.">
    <title>Torneos - Stadion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles.css?v=16">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/Imagenes/logo.png}" alt="Stadion" style="height:52px;">
            Stadion
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/equipos}">Equipos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/jugadores}">Jugadores</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/torneos}">Torneos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/partidos}">Partidos</a></li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/juegos}">Juegos</a></li>
        <li class="nav-item" sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-outline-light btn-sm">👤</a>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">🔒</button>
            </form>
        </li>
    </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="page-header d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <h1>Torneos</h1>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/torneos/nuevo}" class="btn btn-primary">+</a>
    </div>

    <div class="filter-bar" th:if="${not #lists.isEmpty(torneos)}">
        <input type="text" id="filterSearch" class="filter-input" placeholder="Buscar torneo, juego…">
        <select id="filterEstado" class="filter-select">
            <option value="">Todos los estados</option>
            <option value="ACTIVO">Activo</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="FINALIZADO">Finalizado</option>
        </select>
        <select id="filterJuego" class="filter-select">
            <option value="">Todos los juegos</option>
        </select>
    </div>

    <div class="torneo-banner-list" th:if="${not #lists.isEmpty(torneos)}">
        <div class="torneo-mini-banner card-link filter-item" th:each="torneo : ${torneos}"
             style="position:relative"
             th:attr="data-href=@{/torneos/{id}(id=${torneo.id})},data-search=${#strings.toLowerCase(torneo.nombre + ' ' + (torneo.juego != null ? torneo.juego : ''))},data-estado=${torneo.estado != null ? torneo.estado : ''},data-juego=${torneo.juego != null ? torneo.juego : ''}">

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/torneos/eliminar/{id}(id=${torneo.id})}"
               class="btn btn-danger card-delete-btn stop-propagate"
               data-confirm="¿Eliminar este torneo?">✕</a>
            <div class="torneo-mini-banner__media">
                <img th:if="${torneo.foto != null and torneo.foto != ''}"
                     th:src="@{/Imagenes/{f}(f=${torneo.foto})}"
                     alt="Logo torneo"
                     class="torneo-mini-banner__cover">
                <div th:unless="${torneo.foto != null and torneo.foto != ''}"
                     class="torneo-mini-banner__cover torneo-mini-banner__cover-placeholder">🏆</div>
            </div>

            <div class="torneo-mini-banner__content">
                <div class="torneo-mini-banner__top">
                    <div class="torneo-mini-banner__estado">
                        <div class="torneo-mini-banner__label">Estado</div>
                        <span th:switch="${torneo.estado}">
                            <span th:case="'ACTIVO'" class="badge badge-success">Activo</span>
                            <span th:case="'PENDIENTE'" class="badge badge-warning">Pendiente</span>
                            <span th:case="'FINALIZADO'" class="badge badge-finished">Finalizado</span>
                            <span th:case="*" class="badge badge-info" th:text="${torneo.estado}">Estado</span>
                        </span>
                    </div>

                    <h2 class="torneo-mini-banner__title" th:text="${torneo.nombre}">Nombre torneo</h2>
                </div>

                <div class="torneo-mini-banner__bottom">
                    <div>
                        <div class="torneo-mini-banner__label">Juego</div>
                        <div class="torneo-mini-banner__value" th:text="${torneo.juego}">Juego</div>
                    </div>
                    <div>
                        <div class="torneo-mini-banner__label">Fechas</div>
                        <div class="torneo-mini-banner__value torneo-mini-banner__date-range">
                            <span th:text="${torneo.fechaInicio}">Inicio</span>
                            <span>→</span>
                            <span th:text="${torneo.fechaFin}">Fin</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(torneos)}">
        <p>No hay torneos registrados aún.</p>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/torneos/nuevo}" class="btn btn-primary">Crear primer torneo</a>
    </div>
</div>

</body>
<script th:src="@{/app.js?v=7}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
