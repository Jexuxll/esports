<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${jugador.nickname} + ' - Stadion'">Detalle Jugador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/styles.css?v=16">
    <link rel="icon" th:href="@{/favicon.png?v=2}" href="/favicon.png?v=2" type="image/png">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/Imagenes/logo.png}" alt="Stadion" style="height:52px;">
            Stadion
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/equipos}">Equipos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/jugadores}">Jugadores</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/torneos}">Torneos</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/partidos}">Partidos</a></li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/juegos}">Juegos</a></li>
        <li class="nav-item" sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-outline-light btn-sm">👤</a>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-light btn-sm">🔒</button>
            </form>
        </li>
    </ul>
        </div>
    </div>
</nav>

<div class="container-fluid py-3">

    <div class="page-header">
        <h1>Ficha <span th:text="${jugador.nickname}">de Jugador</span></h1>
        <div class="page-actions">
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/jugadores/editar/{id}(id=${jugador.id})}" class="btn btn-primary">✏️ Editar</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/jugadores/eliminar/{id}(id=${jugador.id})}"
               class="btn btn-danger"
               data-confirm="¿Eliminar este jugador?">🗑️ Eliminar</a>
            <a th:href="@{/equipos/{id}(id=${jugador.equipo.id})}" class="btn btn-secondary">← Volver al equipo</a>
        </div>
    </div>

    <!-- Perfil del jugador -->
    <div class="form-card player-profile">

        <!-- Foto -->
        <div class="player-profile__media">
            
            <img th:if="${jugador.foto != null and jugador.foto != ''}"
                 th:src="@{/Imagenes/{f}(f=${jugador.foto})}"
                 alt="Foto jugador"
                 class="player-profile__image">
              <img th:unless="${jugador.foto != null and jugador.foto != ''}"
                  th:src="@{/Imagenes/{f}(f=${(jugador.id % 2 == 0 ? 'ja' : 'jr') + ((jugador.id % 4) + 1) + '.png'})}"
                  alt="Avatar jugador"
                  class="player-profile__image">
        </div>

        <!-- Info -->
           <div class="player-profile__summary">
            <div class="player-profile__header">
                <div class="page-kicker">Player profile</div>
                <div class="player-profile__nickname" th:text="${jugador.nickname}">NICKNAME</div>
                <div class="player-profile__fullname" th:text="${jugador.nombre} + ' ' + ${jugador.apellido}">Nombre Apellido</div>
            </div>

            <div class="player-profile__divider"></div>

            <div class="player-profile__role">
                <div class="player-profile__role-icon">🎯</div>
                <div class="player-profile__role-copy">
                    <span class="player-profile__role-label">Rol Principal</span>
                    <span class="player-profile__role-value" th:text="${jugador.rol}">–</span>
                </div>
            </div>

            <div class="player-profile__grid">
                <div class="player-profile__field">
                    <span class="player-profile__field-label">Edad</span>
                    <span class="player-profile__field-value" th:text="${jugador.edad} + ' años'">–</span>
                </div>
                <div class="player-profile__field">
                    <span class="player-profile__field-label">Nacionalidad</span>
                    <span class="player-profile__field-value" th:text="${jugador.nacionalidad}">–</span>
                </div>
                <div class="player-profile__field">
                    <span class="player-profile__field-label">Juego</span>
                    <span class="player-profile__field-value" th:text="${jugador.juego != null and jugador.juego != '' ? jugador.juego : '–'}">–</span>
                </div>
                <div class="player-profile__field">
                    <span class="player-profile__field-label">Equipo</span>
                    <span class="player-profile__field-value">
                        <a th:if="${jugador.equipo != null}"
                           th:href="@{/equipos/{id}(id=${jugador.equipo.id})}"
                           th:text="${jugador.equipo.nombre}"
                           class="player-profile__team-link">–</a>
                        <span th:if="${jugador.equipo == null}" style="color:var(--text-primary);">–</span>
                    </span>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
<script th:src="@{/app.js?v=7}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
