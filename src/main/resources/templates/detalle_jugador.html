<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${jugador.nickname} + ' - ESports Manager'">Detalle Jugador</title>
    <link rel="stylesheet" href="/styles.css?v=4">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">E<span>Sports</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/}">Inicio</a></li>
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <!-- <li><a th:href="@{/jugadores}" class="active">Jugadores</a></li> -->
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/jugadores}">Jugadores</a></li>
        <li><a th:href="@{/torneos}">Torneos</a></li>
        <li><a th:href="@{/partidos}">Partidos</a></li>
        <!-- <li><a th:href="@{/juegos}">Juegos</a></li> -->
        <li sec:authorize="isAnonymous()">
            <a th:href="@{/admin/login}" class="btn btn-secondary" style="padding:0.45rem 0.8rem;">🔐 Iniciar sesión</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/admin/logout}" method="post" style="display:contents;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary">Salir Admin</button>
            </form>
        </li>
    </ul>
</nav>

<div class="container">

    <div class="page-header">
        <h1>Ficha <span th:text="${jugador.nickname}">de Jugador</span></h1>
        <div class="page-actions">
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/jugadores/editar/{id}(id=${jugador.id})}" class="btn btn-primary">✏️ Editar</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/jugadores/eliminar/{id}(id=${jugador.id})}"
               class="btn btn-danger"
               data-confirm="¿Eliminar este jugador?">🗑️ Eliminar</a>
            <a th:href="@{/equipos/{id}(id=${jugador.equipo.id})}" class="btn btn-secondary">← Volver al equipo</a>
        </div>
    </div>

    <!-- Perfil del jugador -->
    <div class="form-card player-profile">

        <!-- Foto -->
        <div class="player-profile__media">
            <img th:if="${jugador.foto != null and jugador.foto != ''}"
                 th:src="@{/Imagenes/{f}(f=${jugador.foto})}"
                 alt="Foto jugador"
                 class="player-profile__image">
            <div th:unless="${jugador.foto != null and jugador.foto != ''}"
                 class="player-profile__placeholder">🖼️</div>
        </div>

        <!-- Info -->
           <div class="player-profile__summary">
            <div class="player-profile__header">
                <div class="page-kicker">Player profile</div>
                <div class="player-profile__nickname" th:text="${jugador.nickname}">NICKNAME</div>
                <div class="player-profile__fullname" th:text="${jugador.nombre} + ' ' + ${jugador.apellido}">Nombre Apellido</div>
            </div>

            <div class="player-profile__divider"></div>

            <div class="player-profile__role">
                <div class="player-profile__role-icon">🎯</div>
                <div class="player-profile__role-copy">
                    <span class="player-profile__role-label">Rol Principal</span>
                    <span class="player-profile__role-value" th:text="${jugador.rol}">—</span>
                </div>
            </div>

            <div class="player-profile__grid">
                <div class="player-profile__field">
                    <span class="player-profile__field-label">Edad</span>
                    <span class="player-profile__field-value" th:text="${jugador.edad} + ' años'">—</span>
                </div>
                <div class="player-profile__field">
                    <span class="player-profile__field-label">Nacionalidad</span>
                    <span class="player-profile__field-value" th:text="${jugador.nacionalidad}">—</span>
                </div>
                <div class="player-profile__field">
                    <span class="player-profile__field-label">Juego</span>
                    <span class="player-profile__field-value" th:text="${jugador.juego != null and jugador.juego != '' ? jugador.juego : '—'}">—</span>
                </div>
                <div class="player-profile__field">
                    <span class="player-profile__field-label">Equipo</span>
                    <span class="player-profile__field-value">
                        <a th:if="${jugador.equipo != null}"
                           th:href="@{/equipos/{id}(id=${jugador.equipo.id})}"
                           th:text="${jugador.equipo.nombre}"
                           class="player-profile__team-link">—</a>
                        <span th:if="${jugador.equipo == null}" style="color:var(--text-primary);">—</span>
                    </span>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
<script th:src="@{/app.js}"></script>
</html>
