<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Partido - ESports Manager</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <span class="nav-brand">E<span>Sports</span></span>
    <ul class="nav-links">
        <li><a th:href="@{/equipos}">Equipos</a></li>
        <li><a th:href="@{/jugadores}">Jugadores</a></li>
        <li><a th:href="@{/torneos}">Torneos</a></li>
        <li><a th:href="@{/partidos}" class="active">Partidos</a></li>
    </ul>
</nav>

<div class="container">
    <div class="form-card">
        <h2>Editar Partido</h2>

        <form th:action="@{/partidos/actualizar}" th:object="${partido}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="torneoId">ID del Torneo</label>
                <input type="number" id="torneoId" name="torneo.id"
                       th:value="${partido.torneo != null ? partido.torneo.id : ''}"
                       class="form-control" min="1" required>
            </div>

            <div class="form-group">
                <label for="equipoLocalId">ID Equipo Local</label>
                <input type="number" id="equipoLocalId" name="equipoLocal.id"
                       th:value="${partido.equipoLocal != null ? partido.equipoLocal.id : ''}"
                       class="form-control" min="1" required>
            </div>

            <div class="form-group">
                <label for="equipoVisitanteId">ID Equipo Visitante</label>
                <input type="number" id="equipoVisitanteId" name="equipoVisitante.id"
                       th:value="${partido.equipoVisitante != null ? partido.equipoVisitante.id : ''}"
                       class="form-control" min="1" required>
            </div>

            <div class="form-group">
                <label for="ronda">Ronda</label>
                <select id="ronda" th:field="*{ronda}" class="form-control">
                    <option value="">-- Selecciona ronda --</option>
                    <option value="Grupos">Grupos</option>
                    <option value="Octavos">Octavos de final</option>
                    <option value="Cuartos">Cuartos de final</option>
                    <option value="Semifinal">Semifinal</option>
                    <option value="Final">Final</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fechaPartido">Fecha y hora del partido</label>
                <input type="datetime-local" id="fechaPartido" th:field="*{fechaPartido}"
                       class="form-control" required>
            </div>

            <div style="border-top: 1px solid var(--border); padding-top: 1.2rem; margin-top: 1.2rem;">
                <p style="font-size:0.8rem; color:var(--accent-light); font-weight:700; text-transform:uppercase;
                           letter-spacing:0.08em; margin-bottom: 0.8rem;">Resultado</p>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap: 1rem;">
                    <div class="form-group" style="margin:0">
                        <label for="marcadorLocal">Marcador local</label>
                        <input type="number" id="marcadorLocal" th:field="*{marcadorLocal}"
                               class="form-control" min="0" placeholder="0">
                    </div>
                    <div class="form-group" style="margin:0">
                        <label for="marcadorVisitante">Marcador visitante</label>
                        <input type="number" id="marcadorVisitante" th:field="*{marcadorVisitante}"
                               class="form-control" min="0" placeholder="0">
                    </div>
                </div>

                <div class="form-group" style="margin-top:1rem;">
                    <label for="ganadorId">ID del Equipo Ganador</label>
                    <input type="number" id="ganadorId" name="ganador.id"
                           th:value="${partido.ganador != null ? partido.ganador.id : ''}"
                           class="form-control" min="1" placeholder="Dejar vacío si no hay ganador">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                <a th:href="@{/partidos}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
