<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${equipo.nombre} + ' - ESports Manager'">Detalle Equipo</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<nav>
    <a class="nav-brand" th:href="@{/}">E<span>Sports</span></a>
    <ul class="nav-links">
        <li><a th:href="@{/equipos}" class="active">Equipos</a></li>
        <!-- <li><a th:href="@{/jugadores}">Jugadores</a></li> -->
        <li><a th:href="@{/torneos}">Torneos</a></li>
        <li><a th:href="@{/partidos}">Partidos</a></li>
        <!-- <li><a th:href="@{/juegos}">Juegos</a></li> -->
    </ul>
</nav>

<div class="container">

    <div class="page-header">
        <h1 th:text="${equipo.nombre}">Nombre equipo</h1>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            <a th:href="@{/jugadores/nuevo}" class="btn btn-primary">Añadir jugador</a>
            <a th:href="@{/equipos/editar/{id}(id=${equipo.id})}" class="btn btn-secondary">Editar equipo</a>
            <a th:href="@{/equipos/eliminar/{id}(id=${equipo.id})}" class="btn btn-danger"
               onclick="return confirm('¿Eliminar este equipo?')" data-confirm="¿Eliminar este equipo?">Eliminar equipo</a>
            <a th:href="@{/equipos}" class="btn btn-secondary">← Volver</a>
        </div>
    </div>

    <div class="form-card" style="margin-bottom: 2rem; display:flex; gap:1.5rem; align-items:flex-start; flex-wrap:wrap; max-width:100%;">
        <img th:if="${equipo.foto != null and equipo.foto != ''}"
             th:src="@{/Imagenes/{f}(f=${equipo.foto})}"
             class="img-thumb-lg" alt="Logo equipo" style="width:100px; height:100px; object-fit:cover; border-radius:8px;">
        <div th:unless="${equipo.foto != null and equipo.foto != ''}"
             style="width:100px; height:100px; display:flex; align-items:center; justify-content:center; font-size:3rem; background:var(--surface); border-radius:8px;">🛡️</div>
        <div style="flex:1;">
            <p style="font-size:0.9rem; color:var(--text-secondary); margin:0.3rem 0;">
                Tag: <span class="team-tag" th:text="${equipo.tag}">TAG</span>
            </p>
            <p style="font-size:0.9rem; color:var(--text-secondary); margin:0.3rem 0;">
                🌍 <span th:text="${equipo.pais}">País</span>
            </p>
        </div>
    </div>

    <h2 style="margin-bottom:1rem;">Jugadores <span>del Equipo</span></h2>

    <!-- Pestañas archivador por juego -->
    <div th:if="${not #lists.isEmpty(jugadores)}" class="tabs-wrapper">

        <div class="tabs-nav" id="tabsNav">
            <button th:each="entry, iterStat : ${jugadoresPorJuego}"
                    th:text="${entry.key}"
                    th:attr="data-tab=${iterStat.index}"
                    th:classappend="${iterStat.first} ? 'tab-btn active' : 'tab-btn'"
                    class="tab-btn"
                    type="button">Juego</button>
        </div>

        <div th:each="entry, iterStat : ${jugadoresPorJuego}"
             th:attr="data-panel=${iterStat.index}"
             th:classappend="${iterStat.first} ? 'tab-panel active' : 'tab-panel'"
             class="tab-panel">

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Nickname</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Rol</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="jugador : ${entry.value}"
                            th:attr="data-href=@{/jugadores/{id}(id=${jugador.id})}"
                            class="row-link">
                            <td>
                                <img th:if="${jugador.foto != null and jugador.foto != ''}"
                                     th:src="@{/Imagenes/{img}(img=${jugador.foto})}"
                                     class="img-thumb" alt="Foto jugador">
                                <span th:unless="${jugador.foto != null and jugador.foto != ''}">—</span>
                            </td>
                            <td><strong th:text="${jugador.nickname}">Nickname</strong></td>
                            <td th:text="${jugador.nombre}">Nombre</td>
                            <td th:text="${jugador.apellido}">Apellido</td>
                            <td th:text="${jugador.rol}">Rol</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(jugadores)}">
        <p>Este equipo no tiene jugadores registrados.</p>
        <a th:href="@{/jugadores/nuevo}" class="btn btn-primary">Añadir jugador</a>
    </div>

</div>

</body>
<script th:src="@{/app.js}"></script>
</html>
